version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tabriko-db
    environment:
      POSTGRES_DB: tabriko
      POSTGRES_USER: ${DB_USERNAME:-tabriko}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tabriko}
    ports:
      - "5432:5432"
    volumes:
      - tabriko-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tabriko}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tabriko-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tabriko
      DB_USERNAME: ${DB_USERNAME:-tabriko}
      DB_PASSWORD: ${DB_PASSWORD:-tabriko}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-tabriko-access-secret-key-must-be-at-least-32-chars-long!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-tabriko-refresh-secret-key-must-be-at-least-32-chars-long!}
      JWT_ACCESS_EXPIRY_MS: ${JWT_ACCESS_EXPIRY_MS:-3600000}
      JWT_REFRESH_EXPIRY_MS: ${JWT_REFRESH_EXPIRY_MS:-2592000000}
      COMMISSION_PERCENT: ${COMMISSION_PERCENT:-15}
      MEDIA_UPLOAD_DIR: /app/uploads
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-http://localhost:8080/files}
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - tabriko-uploads:/app/uploads

volumes:
  tabriko-pgdata:
  tabriko-uploads:
