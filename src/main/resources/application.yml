spring:
  application:
    name: tabriko-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tabriko}
    username: ${DB_USERNAME:tabriko}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: ${PORT:8080}

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}       # 1 hour
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:2592000000}  # 30 days

  # Comma-separated origins/patterns allowed for browser (CORS). Override via env in prod.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://tabriko-web.vercel.app,https://*.vercel.app,http://localhost:3000,http://localhost:3001}

  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:./uploads}
    base-url: ${MEDIA_BASE_URL:http://localhost:8080/files}
    max-size-mb: ${MEDIA_MAX_SIZE_MB:100}

  base-url: ${BASE_URL:http://localhost:8080}

  storage:
    provider: ${STORAGE_PROVIDER:local}   # local | s3

  commission-percent: ${COMMISSION_PERCENT:15}

  payment:
    # TODO: enable and verify HMAC signature from provider before enabling in production
    callback-enabled: ${PAYMENT_CALLBACK_ENABLED:false}

  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}  # empty = mock mode

  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    uz.tabriko: INFO
    org.springframework.security: WARN
