spring:
  application:
    name: tabriko-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tabriko}
    username: ${DB_USERNAME:tabriko}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: ${PORT:8080}

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}       # 1 hour
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:2592000000}  # 30 days

  # Comma-separated origins/patterns allowed for browser (CORS). Override via env in prod.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://tabriko-web.vercel.app,https://*.vercel.app,http://localhost:3000,http://localhost:3001}

  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:./uploads}
    base-url: ${MEDIA_BASE_URL:http://localhost:8080/files}
    max-size-mb: ${MEDIA_MAX_SIZE_MB:100}

  base-url: ${BASE_URL:http://localhost:8080}

  storage:
    provider: ${STORAGE_PROVIDER:local}   # local | s3

  commission-percent: ${COMMISSION_PERCENT:15}

  payment:
    callback-enabled: ${PAYMENT_CALLBACK_ENABLED:false}
    # Shared secret used to verify the payment provider's HMAC-SHA256 callback signature.
    # Must be set (via env) before enabling callback-enabled in production.
    callback-secret: ${PAYMENT_CALLBACK_SECRET:}

  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}  # empty = mock mode

  otp:
    rate-limit:
      per-phone-max: ${OTP_RATE_LIMIT_PER_PHONE:3}
      per-phone-window-seconds: ${OTP_RATE_LIMIT_PHONE_WINDOW_SECONDS:60}
      per-ip-max: ${OTP_RATE_LIMIT_PER_IP:10}
      per-ip-window-seconds: ${OTP_RATE_LIMIT_IP_WINDOW_SECONDS:900}

  login:
    rate-limit:
      per-phone-max: ${LOGIN_RATE_LIMIT_PER_PHONE:10}
      per-phone-window-seconds: ${LOGIN_RATE_LIMIT_PHONE_WINDOW_SECONDS:60}
      per-ip-max: ${LOGIN_RATE_LIMIT_PER_IP:30}
      per-ip-window-seconds: ${LOGIN_RATE_LIMIT_IP_WINDOW_SECONDS:900}

  attestation:
    enabled: ${ATTESTATION_ENABLED:false}

  appcheck:
    enforced: ${APPCHECK_ENFORCED:false}
    project-number: ${FIREBASE_PROJECT_NUMBER:000000000000}

  integrations:
    live: ${INTEGRATIONS_LIVE:false}

  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
    alert:
      # Separate bot from the Verify bot (TELEGRAM_BOT_TOKEN). Crash alerts use this.
      bot-token: ${TELEGRAM_ALERT_BOT_TOKEN:}
      # Optional single-chat fallback used only when there are no collected
      # subscribers yet; normally alerts broadcast to everyone who /started the bot.
      chat-id: ${TELEGRAM_ALERT_CHAT_ID:}
    alerts:
      enabled: ${TELEGRAM_ALERTS_ENABLED:true}

s3:
  public-base-url: ${S3_PUBLIC_BASE_URL:}   # CDN or public-read bucket base URL for S3 provider

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    uz.tabriko: INFO
    org.springframework.security: WARN
